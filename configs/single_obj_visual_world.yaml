# ── Single Object Visual World — Geodesic camera trajectories around object ──
# Task: single_obj_visual_world.SingleObjVisualWorld
# Policy: single_obj_visual_world.VisualWorldPolicy

scene_path: "assets/scenes/single_part_align.xml"

texture:
  enabled: false
  mode: rgb
  rgba_range: [0.2, 1.0, 0.2, 1.0, 0.2, 1.0, 1.0, 1.0]
  exclude_geoms: [table_top, leg_, floor]

placement:
  enabled: false                             # task handles object placement

lighting:
  enabled: false
  position_jitter: 0.3
  diffuse_range: [0.4, 1.0]
  ambient_range: [0.1, 0.4]
  specular_range: [0.0, 0.4]
  direction_jitter: 0.2
  random_toggle: false

camera:
  enabled: false                             # trajectory camera — no jitter

dataset:
  render_height: 480
  render_width: 640
  save_depth: false
  output_dir: "./datasets"

il_demo:
  enabled: true
  num_demos: 1000
  max_steps: 500                             # trajectory demos can be long
  control_substeps: 1                        # one step() = one waypoint
  camera: "align_cam"                        # the moving camera on cam_body
  display_scale: 1.0
  save_depth: false
  recorder: "simple"

seed: null
