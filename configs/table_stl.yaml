# ── Table + STL Object Scene Configuration ────────────────────────────────────
# 1-3 instances of A-200MAOPI.stl are randomly placed on a table per episode.

scene_path: "assets/scenes/table_with_stl.xml"

placement:
  enabled: true
  num_objects_range: [1, 3]            # [min, max] objects to place on the table
  object_bodies:                        # body names defined in the scene XML
    - obj_1
    - obj_2
    - obj_3
  table_x_range: [-0.30, 0.30]         # meters, within table top bounds
  table_y_range: [-0.22, 0.22]         # meters, within table top bounds
  table_z: 0.425                        # height of table surface (top of table geom)
  yaw_range: [-180.0, 180.0]           # degrees, random rotation around Z
  hide_z: -10.0                         # hidden objects moved here

texture:
  enabled: true
  mode: rgb
  rgba_range: [0.2, 1.0, 0.2, 1.0, 0.2, 1.0, 1.0, 1.0]
  exclude_geoms:                        # exclude table & floor from color randomization
    - table_top
    - leg_
    - floor

lighting:
  enabled: true
  position_jitter: 0.3
  diffuse_range: [0.4, 1.0]
  ambient_range: [0.1, 0.4]
  specular_range: [0.0, 0.4]
  direction_jitter: 0.2
  random_toggle: false

camera:
  enabled: true
  position_jitter: [0.05, 0.05, 0.03]
  rotation_jitter: 0.03
  fovy_range: [45.0, 60.0]
  random_camera: true

dataset:
  num_episodes: 100
  frames_per_episode: 1
  output_dir: "./datasets"
  render_height: 480
  render_width: 640
  save_depth: true
  save_segmentation: false

seed: null
